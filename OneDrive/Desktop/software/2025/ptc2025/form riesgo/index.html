<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Riesgos Potenciales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
   <link rel="stylesheet" href="style.css">

</head>
<body class="bg-light">

<div class="container py-4">
  <h2 class="mb-4 text-center">Riesgos Potenciales</h2>

  <!-- Tabla de reportes -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">Reportes</h5>
      <table class="table table-bordered table-hover" id="tablaReportes">
        <thead class="table-dark">
          <tr>
            <th>Código</th>
            <th>Tipo</th>
            <th>Nivel</th>
            <th>Probabilidad</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Tarjetas de tipos de riesgo -->
  <h4 class="mb-3">Selecciona un Tipo de Riesgo</h4>
  <div class="row" id="tarjetasTipos"></div>

  <!-- Formulario -->
  <div class="card shadow-sm mt-4">
    <div class="card-body">
      <h5 class="card-title">Reportar Riesgo</h5>
      <form id="formRiesgo">
        <div class="mb-3">
          <label class="form-label">Código</label>
          <input type="text" id="codigo" class="form-control" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">Tipo de Riesgo</label>
          <select id="tipoRiesgo" class="form-select" required>
            <option value="">Seleccione...</option>
            <option value="Deslizamiento">Deslizamineto</option>
            <option value="Caida">Caida</option>
            <option value="Tropiezo">Tropiezo</option>
            <option value="Golpe">Golpe</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Probabilidad (%)</label>
          <input type="number" id="probabilidad" class="form-control" min="0" max="100" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Nivel de Riesgo</label>
          <select id="nivelRiesgo" class="form-select" required>
            <option value="">Seleccione...</option>
            <option value="Bajo">Bajo</option>
            <option value="Medio">Medio</option>
            <option value="Alto">Alto</option>
            <option value="Crítico">Crítico</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Ubicación</label>
          <select id="ubicacion" class="form-select" required>
             <option value="">Seleccione...</option>
            <option value="Canchas">Canchas</option>
            <option value="Patios">Patio</option>
            <option value="Cafeterias">Cafeteria</option>
            <option value="Hall">Hall</option>
          </select>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Evidencias</label>
          <input type="file" id="evidencia" class="form-control" accept="image/*" multiple>
          <div class="form-text text-danger">Mínimo 1 imagen para reportar el riesgo</div>
          <div id="preview" class="d-flex gap-2 mt-2 flex-wrap"></div>
        </div>
        <button type="submit" class="btn btn-success">Guardar Reporte</button>
      </form>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalVer" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Detalle del Reporte</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detalleReporte"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
